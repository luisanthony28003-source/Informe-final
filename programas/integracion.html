<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<title>Integración Numérica RC</title>


<style>


body{

font-family:Arial, sans-serif;

background:#f4f6f8;

text-align:center;

margin:0;

}


header{

background:#003366;

color:white;

padding:25px;

}


.card{

background:white;

max-width:850px;

margin:40px auto;

padding:30px;

border-radius:15px;

box-shadow:0px 5px 15px rgba(0,0,0,0.15);

}


button{

background:#00509e;

color:white;

border:none;

padding:12px 25px;

border-radius:25px;

cursor:pointer;

}


button:hover{

background:#003366;

}


table{

margin:20px auto;

border-collapse:collapse;

}


td,th{

border:1px solid #aaa;

padding:8px;

}


#resultado{

margin-top:25px;

font-size:20px;

font-weight:bold;

color:#003366;

}


</style>


</head>




<body>



<header>

<h1>
Integración Numérica
</h1>

<p>
Regla del Trapecio Compuesta aplicada al circuito RC
</p>

</header>





<div class="card">


<h2>
Datos experimentales de carga
</h2>


<p>

Cálculo del área bajo la curva de voltaje entre 0 y 60 segundos.

</p>



<table>


<tr>

<th>
Tiempo (s)
</th>

<th>
Voltaje (V)
</th>

</tr>



<tr><td>0</td><td>0.000</td></tr>

<tr><td>2</td><td>0.390</td></tr>

<tr><td>5</td><td>1.630</td></tr>

<tr><td>10</td><td>2.970</td></tr>

<tr><td>20</td><td>4.150</td></tr>

<tr><td>30</td><td>4.550</td></tr>

<tr><td>60</td><td>4.830</td></tr>


</table>



<br>


<button onclick="calcular()">

Calcular integral

</button>




<div id="resultado"></div>



</div>







<script>


function calcular(){



let t=[0,2,5,10,20,30,60];


let V=[0.000,0.390,1.630,2.970,4.150,4.550,4.830];



let area=0;



let detalle="";




for(let i=1;i<t.length;i++){



let h=t[i]-t[i-1];



let Ai=((V[i-1]+V[i])*h)/2;



area+=Ai;



detalle += 
"Intervalo "+t[i-1]+" - "+t[i]
+" s : "
+Ai.toFixed(3)
+" V·s<br>";



}




let tiempoTotal=60;



let promedio=area/tiempoTotal;





// Integral teórica del modelo RC


let Vmax=4.830;

let tau=10;



let integralTeorica =

Vmax*

(

tiempoTotal

+

tau*Math.exp(-tiempoTotal/tau)

-

tau

);





let promedioTeorico=

integralTeorica/tiempoTotal;





let error=

Math.abs(promedio-promedioTeorico)

/

promedioTeorico*100;





document.getElementById("resultado").innerHTML=


`

<h3>Resultados</h3>

Área total = ${area.toFixed(3)} V·s

<br>

Voltaje promedio = ${promedio.toFixed(4)} V

<br>

Voltaje promedio teórico = ${promedioTeorico.toFixed(4)} V

<br>

Error relativo = ${error.toFixed(3)} %

<br><br>

<b>Detalle de cálculo:</b>

<br>

${detalle}

`;



}



</script>




</body>

</html>
