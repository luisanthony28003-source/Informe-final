<script>


function calcular(){


let V0 = Number(document.getElementById("V0").value);

let R = Number(document.getElementById("R").value);

let C = Number(document.getElementById("C").value);

let tf = Number(document.getElementById("tf").value);

let h = Number(document.getElementById("h").value);



// Constante de tiempo

let tau = R*C;




// Ecuación diferencial del circuito RC

function f(t,V){

return -V/tau;

}





let tiempo=[];

let voltaje=[];


let V=V0;




// Método RK4

for(let t=0; t<=tf; t+=h){


tiempo.push(t);

voltaje.push(V);



let k1=f(t,V);



let k2=f(

t+h/2,

V+(h/2)*k1

);



let k3=f(

t+h/2,

V+(h/2)*k2

);



let k4=f(

t+h,

V+h*k3

);




V = V +

(h/6)*(

k1+

2*k2+

2*k3+

k4

);


}





// Solución exacta

function exacta(t){

return V0*Math.exp(-t/tau);

}




// Crear tabla

let tabla="";


for(let i=0;i<tiempo.length;i++){


tabla +=

`

<tr>

<td>${tiempo[i].toFixed(1)}</td>

<td>${voltaje[i].toFixed(4)}</td>

<td>${exacta(tiempo[i]).toFixed(4)}</td>

</tr>


`;



}




document.getElementById("resultado").innerHTML =


`

<h2>
Resultados de la simulación
</h2>


<p>

<b>
Constante de tiempo del circuito:
</b>

<br>

τ = R × C = ${tau.toFixed(3)} segundos

</p>



<p>

<b>
Ecuación diferencial utilizada:
</b>

<br>

dV/dt = -V/(RC)

</p>




<p>

<b>
Fórmula del método RK4:
</b>

<br><br>

V(n+1) = V(n) + (h/6) × [k1 + 2k2 + 2k3 + k4]

</p>




<h2>
Comparación RK4 y solución analítica
</h2>



<table>


<tr>

<th>
Tiempo (s)
</th>


<th>
RK4 (V)
</th>


<th>
Modelo exacto (V)
</th>


</tr>


${tabla}


</table>





<h2>
Interpretación física
</h2>



<p>

El método Runge-Kutta de cuarto orden permite aproximar la evolución del voltaje del capacitor durante la descarga resolviendo la ecuación diferencial del circuito RC.

</p>



<p>

La simulación reproduce el comportamiento exponencial decreciente característico de un capacitor que libera la energía almacenada a través de una resistencia.

</p>



<p>

Las diferencias respecto a un circuito real pueden aparecer debido a tolerancias de los componentes electrónicos, variaciones de capacitancia y resolución del sistema de medición.

</p>



`;



}


</script>
