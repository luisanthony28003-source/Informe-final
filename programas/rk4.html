<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<title>Runge-Kutta 4 - Circuito RC</title>


<style>

body{

font-family:Arial, sans-serif;

background:#f4f6f8;

text-align:center;

}


.card{

background:white;

width:800px;

max-width:90%;

margin:40px auto;

padding:30px;

border-radius:15px;

box-shadow:0px 0px 10px #ccc;

}


input{

padding:8px;

margin:5px;

width:130px;

}


button{

padding:12px 25px;

background:#00509e;

color:white;

border:none;

border-radius:5px;

cursor:pointer;

}


button:hover{

background:#003f7d;

}



table{

margin:20px auto;

border-collapse:collapse;

}



th,td{

border:1px solid #aaa;

padding:8px 15px;

}



th{

background:#00509e;

color:white;

}



#resultado{

margin-top:20px;

text-align:center;

line-height:1.6;

}


</style>


</head>


<body>



<div class="card">


<h1>
Método Runge-Kutta de Cuarto Orden
</h1>


<p>

Simulación de la descarga de un capacitor en un circuito RC mediante un método numérico.

</p>



<h3>
Modelo matemático
</h3>


<p>

dV/dt = -V/(R*C)

</p>



<hr>



<h3>
Datos del circuito
</h3>



Voltaje inicial:

<br>

<input id="V0" type="number" value="4.83">

V


<br>



Resistencia:

<br>

<input id="R" type="number" value="10000">

Ω


<br>



Capacitancia:

<br>

<input id="C" type="number" value="0.001">

F


<br>



Tiempo de simulación:

<br>

<input id="tf" type="number" value="60">

s



<br><br>



<button onclick="calcular()">

Calcular RK4

</button>




<div id="resultado"></div>



</div>





<script>


function calcular(){



let V0 = Number(document.getElementById("V0").value);

let R = Number(document.getElementById("R").value);

let C = Number(document.getElementById("C").value);

let tf = Number(document.getElementById("tf").value);



let h = 1;



let tau = R*C;



let V = V0;



let tabla="";





// Ecuación diferencial

function f(V){

return -V/tau;

}





// Método RK4


for(let t=0;t<=tf;t+=h){



// Guardar valor actual

tabla +=

`

<tr>

<td>${t}</td>

<td>${V.toFixed(4)}</td>

</tr>

`;




// Calculo de pendientes

let k1=f(V);



let k2=f(V+(h*k1)/2);



let k3=f(V+(h*k2)/2);



let k4=f(V+h*k3);




// Actualización RK4

V = V +

(h/6)*(

k1+

2*k2+

2*k3+

k4

);



}





document.getElementById("resultado").innerHTML=


`

<h2>
Resultados
</h2>


<p>

<b>
Constante de tiempo:

</b>

<br>

τ = R × C = ${tau.toFixed(3)} segundos

</p>



<p>

<b>
Método utilizado:
</b>

<br>

Runge-Kutta de cuarto orden (RK4)

</p>



<p>

<b>
Ecuación resuelta:
</b>

<br>

dV/dt = -V/(R*C)

</p>




<h3>
Tabla de descarga simulada
</h3>



<table>


<tr>

<th>
Tiempo (s)
</th>


<th>
Voltaje (V)
</th>


</tr>


${tabla}


</table>




<p>

<b>
Interpretación:</b>

<br>

El método RK4 aproxima la descarga del capacitor calculando la evolución del voltaje en pequeños intervalos de tiempo.

</p>



<p>

El resultado representa el comportamiento exponencial decreciente esperado en un circuito RC real.

</p>


`;



}


</script>


</body>

</html>
