<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<title>Runge Kutta 4 - Circuito RC</title>


<style>

body{

font-family:Arial;

background:#f4f6f8;

text-align:center;

}


.card{

background:white;

width:800px;

max-width:90%;

margin:40px auto;

padding:30px;

border-radius:15px;

box-shadow:0px 0px 10px #ccc;

}


input{

padding:8px;

margin:5px;

width:120px;

}


button{

padding:10px 25px;

background:#00509e;

color:white;

border:none;

border-radius:5px;

cursor:pointer;

}



table{

margin:20px auto;

border-collapse:collapse;

}


td,th{

border:1px solid #aaa;

padding:8px;

}



th{

background:#00509e;

color:white;

}



#resultado{

margin-top:20px;

text-align:left;

line-height:1.6;

}


</style>


</head>



<body>


<div class="card">


<h1>
Método Runge-Kutta de Cuarto Orden
</h1>


<p>

Simulación de la descarga de un capacitor en un circuito RC.

</p>


<h3>
Ecuación del sistema
</h3>


<p>

dV/dt = -V/(R*C)

</p>



<hr>



<h3>
Parámetros
</h3>


Voltaje inicial:

<br>

<input id="V0" value="4.83" type="number">

V


<br>


Resistencia:

<br>

<input id="R" value="10000" type="number">

Ω


<br>


Capacitancia:

<br>

<input id="C" value="0.001" type="number">

F


<br>


Tiempo final:

<br>

<input id="tf" value="60" type="number">

s


<br><br>


<button onclick="calcular()">

Calcular RK4

</button>



<div id="resultado"></div>


</div>





<script>


function calcular(){



let V0=

Number(document.getElementById("V0").value);



let R=

Number(document.getElementById("R").value);



let C=

Number(document.getElementById("C").value);



let tf=

Number(document.getElementById("tf").value);



let h=2;



let tau=R*C;



let V=V0;



let tabla="";





function f(V){

return -V/tau;

}





for(let t=0;t<=tf;t+=h){



let inicial=V;



let k1=f(V);



let k2=f(V+h*k1/2);



let k3=f(V+h*k2/2);



let k4=f(V+h*k3);




V=V+(h/6)*(k1+2*k2+2*k3+k4);




if(t%10==0){


tabla+=`

<tr>

<td>${t}</td>

<td>${V.toFixed(4)}</td>

</tr>

`;


}



}




document.getElementById("resultado").innerHTML=

`

<h3>Resultado</h3>


<p>

Constante de tiempo:

<b>

τ = ${tau.toFixed(2)} s

</b>

</p>


<p>

El método RK4 calculó la evolución del voltaje del capacitor resolviendo la ecuación diferencial de descarga.

</p>



<table>

<tr>

<th>
Tiempo (s)
</th>

<th>
Voltaje (V)
</th>

</tr>


${tabla}


</table>



<p>

<b>Interpretación:</b>

<br>

El voltaje disminuye progresivamente debido a la descarga de energía almacenada en el capacitor. El método RK4 permite aproximar este comportamiento mediante pasos sucesivos de cálculo.

</p>


`;



}


</script>


</body>


</html>
