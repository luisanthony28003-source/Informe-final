<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora RC</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align:center;
            margin-top:50px;
            background:#f5f5f5;
        }

        input{
            padding:8px;
            margin:5px;
            width:180px;
        }

        button{
            padding:10px 20px;
            cursor:pointer;
        }

        #resultado{
            margin-top:20px;
            font-size:22px;
            font-weight:bold;
            color:blue;
        }
    </style>
</head>

<body>

<h1>Calculadora de Circuito RC</h1>

<input id="R" type="number" placeholder="Resistencia (Ω)"><br>

<input id="C" type="number" placeholder="Capacitancia (F)"><br>

<input id="t" type="number" placeholder="Tiempo (s)"><br><br>

<button onclick="calcular()">Calcular</button>

<div id="resultado"></div>

<script>
function calcular(){

    let R = parseFloat(document.getElementById("R").value);
    let C = parseFloat(document.getElementById("C").value);
    let t = parseFloat(document.getElementById("t").value);

    let V0 = 5;

    let V = V0 * Math.exp(-t/(R*C));

    document.getElementById("resultado").innerHTML =
        "Voltaje = " + V.toFixed(4) + " V";
}
</script>

</body>
</html>
